<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdgeTier Report Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f9f7;
    --surface: #ffffff;
    --surface2: #f1efe8;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-info: #185fa5;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --surface: #242422;
      --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.2);
      --text: #f0ede4;
      --text-secondary: #b4b2a9;
      --text-info: #85b7eb;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-title { font-size: 15px; font-weight: 500; }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .file-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 99px;
    padding: 4px 12px;
  }

  .btn {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.12s;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary {
    background: #185fa5;
    color: #fff;
    border-color: #185fa5;
  }
  .btn-primary:hover { background: #0c447c; border-color: #0c447c; }

  /* --- Input screen --- */
  #input-screen {
    max-width: 640px;
    margin: 48px auto;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .input-heading {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .input-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 0.5px solid var(--border-strong);
    margin-bottom: 20px;
  }
  .tab {
    font-size: 13px;
    font-family: inherit;
    padding: 8px 18px;
    border: none;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.12s;
  }
  .tab.active {
    color: var(--text);
    border-bottom-color: #185fa5;
    font-weight: 500;
  }
  .tab:hover:not(.active) { color: var(--text); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Paste panel */
  .paste-area {
    width: 100%;
    min-height: 220px;
    padding: 14px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text);
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-lg);
    resize: vertical;
    outline: none;
    transition: border-color 0.12s;
  }
  .paste-area:focus { border-color: #185fa5; }
  .paste-area::placeholder { color: var(--text-secondary); font-family: -apple-system, sans-serif; font-size: 13px; }

  .paste-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 10px;
  }

  /* Drop panel */
  .drop-zone {
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 52px 32px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    background: var(--surface);
  }
  .drop-zone:hover, .drop-zone.drag {
    background: var(--surface2);
    border-color: #185fa5;
  }
  .drop-zone input { display: none; }
  .drop-icon {
    width: 44px;
    height: 44px;
    margin: 0 auto 12px;
    background: var(--surface2);
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .drop-title { font-size: 15px; font-weight: 500; margin-bottom: 5px; }
  .drop-sub { font-size: 13px; color: var(--text-secondary); }

  .error-bar {
    margin-top: 14px;
    padding: 10px 16px;
    background: #fcebeb;
    color: #791f1f;
    border-radius: var(--radius-md);
    font-size: 13px;
    display: none;
  }

  /* --- Report --- */
  #report-screen { display: none; }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  .r-title-2 { font-size: 22px; font-weight: 500; margin: 0 0 4px; }
  .r-title-4 { font-size: 16px; font-weight: 500; margin: 0 0 8px; }
  .r-title-5 { font-size: 14px; font-weight: 500; margin: 0 0 6px; }

  .r-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
    margin-bottom: 14px;
  }
  .r-paper {
    background: var(--surface2);
    border-radius: var(--radius-lg);
    padding: 18px;
    margin-bottom: 14px;
  }
  .r-stack-sm { display: flex; flex-direction: column; gap: 8px; }
  .r-stack-md { display: flex; flex-direction: column; gap: 14px; }
  .r-group { display: flex; flex-wrap: wrap; gap: 10px; }
  .r-group.grow > * { flex: 1; min-width: 100px; }

  .r-metric { background: var(--surface2); border-radius: var(--radius-md); padding: 12px 14px; }
  .r-metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
  .r-metric-value { font-size: 22px; font-weight: 500; }
  .r-metric-footer { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

  .r-list { list-style: disc; padding-left: 20px; display: flex; flex-direction: column; gap: 7px; font-size: 14px; line-height: 1.65; }

  .r-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .r-table th { text-align: left; padding: 7px 10px; background: var(--surface2); font-weight: 500; font-size: 12px; color: var(--text-secondary); border-bottom: 0.5px solid var(--border); }
  .r-table td { padding: 7px 10px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  .r-table tr:last-child td { border-bottom: none; }
  .r-table tr:nth-child(even) td { background: var(--surface2); }
  .r-table-wrap { overflow-x: auto; }

  .r-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
  .r-badge.red    { background: #fcebeb; color: #a32d2d; }
  .r-badge.orange { background: #faeeda; color: #854f0b; }
  .r-badge.green  { background: #eaf3de; color: #3b6d11; }
  .r-badge.teal   { background: #e1f5ee; color: #0f6e56; }
  .r-badge.yellow { background: #faeeda; color: #854f0b; }
  .r-badge.blue   { background: #e6f1fb; color: #185fa5; }

  .r-alert { border-radius: var(--radius-md); padding: 12px 16px; font-size: 13px; line-height: 1.65; }
  .r-alert.yellow { background: #faeeda; color: #633806; border-left: 3px solid #ef9f27; }
  .r-alert.red    { background: #fcebeb; color: #791f1f; border-left: 3px solid #e24b4a; }
  .r-alert.blue   { background: #e6f1fb; color: #0c447c; border-left: 3px solid #378add; }
  .r-alert-title  { font-weight: 500; margin-bottom: 5px; font-size: 13px; }

  .r-md a { color: var(--text-info); }
  .r-md strong { font-weight: 500; }
  .r-md em { font-style: italic; }
  .r-md p { margin: 0 0 9px; font-size: 14px; line-height: 1.65; }
  .r-md p:last-child { margin-bottom: 0; }
</style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="22" height="22" rx="6" fill="#185FA5"/>
    <rect x="5" y="10" width="12" height="2" rx="1" fill="white"/>
    <rect x="5" y="6" width="8" height="2" rx="1" fill="white"/>
    <rect x="5" y="14" width="10" height="2" rx="1" fill="white"/>
  </svg>
  <span class="header-title">EdgeTier Report Viewer</span>
  <div class="header-right" id="headerRight" style="display:none">
    <div class="file-pill" id="filePill">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 2h7l3 3v9H3V2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2v3h3" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      <span id="filePillName"></span>
    </div>
    <button class="btn" onclick="reset()">Load another report</button>
  </div>
</header>

<div id="input-screen">
  <div class="input-heading">Load a report</div>
  <div class="input-sub">Paste the raw JSON output, or drag and drop an output file.</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('paste')">Paste JSON</button>
    <button class="tab" onclick="switchTab('file')">Drop a file</button>
  </div>

  <div class="tab-panel active" id="panel-paste">
    <textarea
      class="paste-area"
      id="pasteArea"
      placeholder='Paste your JSON here — the full output blob, e.g. {"tree": [...]} or the raw shell output wrapper'
      spellcheck="false"
    ></textarea>
    <div class="paste-actions">
      <button class="btn" onclick="clearPaste()">Clear</button>
      <button class="btn btn-primary" onclick="submitPaste()">Render report →</button>
    </div>
  </div>

  <div class="tab-panel" id="panel-file">
    <div class="drop-zone" id="dropzone">
      <input type="file" id="fileInput" accept=".txt,.json">
      <div class="drop-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
      </div>
      <div class="drop-title">Drop your output file here</div>
      <div class="drop-sub">or click to browse &middot; .txt or .json</div>
    </div>
  </div>

  <div class="error-bar" id="errorBar"></div>
</div>

<div id="report-screen">
  <main><div id="root"></div></main>
</div>

<script>
const colorMap = { blue:'#185fa5', teal:'#0f6e56', red:'#a32d2d', orange:'#854f0b', green:'#3b6d11', gray:'#5f5e5a', yellow:'#854f0b', violet:'#534ab7' };
const progressColorMap = { red:'#e24b4a', orange:'#ef9f27', green:'#1d9e75', teal:'#1d9e75', yellow:'#ef9f27', blue:'#378add' };
let chartCount = 0, activeCharts = [];

function md(str) { return typeof marked !== 'undefined' ? marked.parse(str) : str; }

function getBorderColor(styleObj) {
  if (!styleObj?.borderLeft) return '';
  const m = styleObj.borderLeft.match(/mantine-color-(\w+)-/);
  return m ? (colorMap[m[1]] || '#378add') : '';
}

function renderNode(node) {
  if (typeof node === 'string') return node;
  if (Array.isArray(node)) return node.map(renderNode).join('');
  if (!node?.component) return '';
  const { component, props = {}, children } = node;
  const ch = children
    ? Array.isArray(children) ? children.map(renderNode).join('') : renderNode(children)
    : '';

  switch (component) {
    case 'Title': {
      const o = props.order || 2;
      return `<h${o} class="r-title-${o}">${ch}</h${o}>`;
    }
    case 'Markdown':
      return `<div class="r-md">${md(props.markdownString || '')}</div>`;
    case 'Card': {
      const bc = getBorderColor(props.style);
      const bl = bc ? `border-left:4px solid ${bc};border-radius:0 var(--radius-lg) var(--radius-lg) 0;` : '';
      return `<div class="r-card" style="${bl}">${ch}</div>`;
    }
    case 'Paper':
      return `<div class="r-paper">${ch}</div>`;
    case 'Stack':
      return `<div class="${props.gap === 'sm' ? 'r-stack-sm' : 'r-stack-md'}">${ch}</div>`;
    case 'Group':
      return `<div class="r-group${props.grow ? ' grow' : ''}">${ch}</div>`;
    case 'CardMetric': {
      const color = colorMap[props.color] || 'var(--text)';
      const m0 = (props.metric || [])[0] || {};
      return `<div class="r-metric">
        <div class="r-metric-label">${props.title || ''}</div>
        <div class="r-metric-value" style="color:${color}">${m0.value || ''}</div>
        ${m0.footer ? `<div class="r-metric-footer">${m0.footer}</div>` : ''}
      </div>`;
    }
    case 'LineChart': {
      const id = `chart-${chartCount++}`;
      const data = props.data || [];
      const seriesName = (props.series || [{ name: 'Value' }])[0].name;
      setTimeout(() => {
        const canvas = document.getElementById(id);
        if (!canvas || !window.Chart) return;
        const c = new Chart(canvas, {
          type: 'line',
          data: {
            labels: data.map(d => d[props.dataKey]),
            datasets: [{ label: seriesName, data: data.map(d => d[seriesName]),
              borderColor: '#378add', backgroundColor: 'rgba(55,138,221,0.08)',
              borderWidth: 2, pointRadius: 3, fill: true, tension: 0.3 }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#888' } },
              y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { font: { size: 11 }, color: '#888' },
                title: { display: !!props.yAxisLabel, text: props.yAxisLabel || '', font: { size: 11 }, color: '#888' } }
            }
          }
        });
        activeCharts.push(c);
      }, 80);
      return `<div style="height:${props.h || 220}px;position:relative;margin-top:8px;"><canvas id="${id}"></canvas></div>`;
    }
    case 'Table':
      return `<div class="r-table-wrap"><table class="r-table">${ch}</table></div>`;
    case 'Thead': return `<thead>${ch}</thead>`;
    case 'Tbody': return `<tbody>${ch}</tbody>`;
    case 'Tr':    return `<tr>${ch}</tr>`;
    case 'Th':    return `<th>${ch}</th>`;
    case 'Td':
      return props.href
        ? `<td><a href="${props.href}" style="color:var(--text-info);text-decoration:none;" target="_blank" rel="noreferrer">${ch}</a></td>`
        : `<td>${ch}</td>`;
    case 'Progress': {
      const pct = props.value || 0;
      const color = progressColorMap[props.color] || '#378add';
      const w = props.w || 60;
      return `<div style="display:flex;align-items:center;gap:6px;">
        <div style="width:${w}px;height:5px;border-radius:3px;background:rgba(128,128,128,0.15);overflow:hidden;flex-shrink:0;">
          <div style="width:${Math.min(pct,100)}%;height:100%;background:${color};border-radius:3px;"></div>
        </div>
      </div>`;
    }
    case 'Text': {
      const dimmed = props.c === 'dimmed';
      const small = props.size === 'xs' || props.size === 'sm';
      return `<span style="${dimmed ? 'color:var(--text-secondary);' : ''}${small ? 'font-size:12px;' : ''}">${ch}</span>`;
    }
    case 'Badge':
      return `<span class="r-badge ${props.color || 'blue'}">${ch}</span>`;
    case 'Alert': {
      const color = props.color || 'blue';
      return `<div class="r-alert ${color}">${props.title ? `<div class="r-alert-title">${props.title}</div>` : ''}${ch}</div>`;
    }
    case 'List':
      return `<ul class="r-list">${ch}</ul>`;
    case 'ListItem': {
      const content = typeof children === 'string'
        ? md(children).replace(/<\/?p>/g, '')
        : ch;
      return `<li>${content}</li>`;
    }
    default:
      return ch || '';
  }
}

function parseOutput(text) {
  text = text.trim();
  try { const o = JSON.parse(text); if (o.tree) return { tree: o.tree, label: 'pasted JSON' }; if (Array.isArray(o)) return { tree: o, label: 'pasted JSON' }; } catch(e) {}
  try {
    const o = JSON.parse(text);
    if (o.stdout) { const i = JSON.parse(o.stdout); if (i.tree) return { tree: i.tree, label: 'pasted JSON' }; }
  } catch(e) {}
  const m = text.match(/"stdout"\s*:\s*"([\s\S]+?)(?=",\s*"stderr"|"\s*\})/);
  if (m) {
    try {
      const unesc = m[1].replace(/\\n/g,'').replace(/\\"/g,'"').replace(/\\\\/g,'\\');
      const i = JSON.parse(unesc); if (i.tree) return { tree: i.tree, label: 'pasted JSON' };
    } catch(e) {}
  }
  throw new Error('Could not find a component tree. Expected JSON with a "tree" array.');
}

function destroyCharts() {
  activeCharts.forEach(c => { try { c.destroy(); } catch(e){} });
  activeCharts = []; chartCount = 0;
}

function showError(msg) {
  const el = document.getElementById('errorBar');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorBar').style.display = 'none';
}

function renderReport(tree, label) {
  destroyCharts();
  document.getElementById('root').innerHTML = tree.map(renderNode).join('');
  document.getElementById('input-screen').style.display = 'none';
  document.getElementById('report-screen').style.display = 'block';
  document.getElementById('headerRight').style.display = 'flex';
  document.getElementById('filePillName').textContent = label;
  window.scrollTo(0, 0);
}

function reset() {
  destroyCharts();
  document.getElementById('root').innerHTML = '';
  document.getElementById('input-screen').style.display = 'block';
  document.getElementById('report-screen').style.display = 'none';
  document.getElementById('headerRight').style.display = 'none';
  document.getElementById('fileInput').value = '';
  hideError();
}

// --- Paste tab ---
function submitPaste() {
  hideError();
  const text = document.getElementById('pasteArea').value.trim();
  if (!text) { showError('Nothing to render — paste your JSON first.'); return; }
  try {
    const { tree, label } = parseOutput(text);
    renderReport(tree, label);
  } catch(err) {
    showError(err.message);
  }
}

function clearPaste() {
  document.getElementById('pasteArea').value = '';
  hideError();
}

// Allow Cmd+Enter / Ctrl+Enter to submit from textarea
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pasteArea').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) submitPaste();
  });
});

// --- File tab ---
function handleFile(file) {
  if (!file) return;
  hideError();
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const { tree } = parseOutput(e.target.result);
      renderReport(tree, file.name);
    } catch(err) {
      showError(err.message);
    }
  };
  reader.readAsText(file);
}

const dz = document.getElementById('dropzone');
dz.addEventListener('click', () => document.getElementById('fileInput').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag');
  // Switch to file tab so user sees context
  switchTab('file');
  handleFile(e.dataTransfer.files[0]);
});
document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));

// Also allow dropping onto the paste textarea
document.getElementById('pasteArea').addEventListener('dragover', e => e.preventDefault());
document.getElementById('pasteArea').addEventListener('drop', e => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
});

// --- Tabs ---
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
  hideError();
}
</script>
</body>
</html>
